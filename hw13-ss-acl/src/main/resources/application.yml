spring:
  datasource:
    #url: jdbc:h2:file:~/maindb
    url: jdbc:h2:mem:maindb
    username: sa
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql
      schema-locations: classpath:schema.sql
  jpa:
    hibernate:
      ddl-auto: none
  mvc:
    hiddenmethod:
      filter:
        enabled: true
logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.security.acls: DEBUG
