spring:
  datasource:
    url: jdbc:h2:mem:maindb
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  sql:
    init:
      mode: always
      data-locations: data.sql
      schema-locations: schema.sql
  jpa:
    hibernate:
      ddl-auto: none
    defer-datasource-initialization: true
    show-sql: true
  data:
    mongodb:
      host: localhost
      port: 27017
      database: otus
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: true
logging:
  level:
    org.springframework.batch: INFO

